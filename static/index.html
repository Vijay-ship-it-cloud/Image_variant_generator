<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Variant Studio</title>
<style>
  :root {
    --ink: #1b1d22;
    --paper: #f7f6f3;
    --panel: #ffffff;
    --line: #e2e0db;
    --muted: #6b6f76;
    --accent: #1862a8;
    --good: #1f7a4d;
    --warn: #b8531f;
    --mono: "Consolas", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
  }

  .shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
  }

  header.top h1 {
    font-size: 20px;
    font-weight: 650;
    letter-spacing: -0.01em;
    margin: 0;
  }

  header.top .tag {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
  }

  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
  }

  .panel + .panel { margin-top: 20px; }

  .panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px 0;
    font-weight: 650;
  }

  .dropzone {
    border: 1.5px dashed var(--line);
    border-radius: 8px;
    padding: 28px 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
    color: var(--muted);
    font-size: 13px;
  }
  .dropzone:hover, .dropzone.drag {
    border-color: var(--accent);
    background: #eef4fb;
  }
  .dropzone img {
    max-width: 100%;
    max-height: 160px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  label.field-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 16px 0 6px;
  }
  .panel label.field-label:first-of-type { margin-top: 0; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12.5px;
    cursor: pointer;
    user-select: none;
    color: var(--ink);
  }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .palette-dot {
    width: 9px; height: 9px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }

  input[type="range"] { width: 100%; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-val { font-family: var(--mono); font-size: 12.5px; min-width: 38px; text-align: right; }

  button.primary {
    width: 100%;
    margin-top: 20px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  button.primary:hover { opacity: 0.85; }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

  button.secondary {
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  button.secondary:hover { border-color: var(--accent); color: var(--accent); }

  .status-line {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
    min-height: 16px;
  }

  .progress-track {
    height: 4px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 10px;
    display: none;
  }
  .progress-track.active { display: block; }
  .progress-fill {
    height: 100%;
    width: 30%;
    background: var(--accent);
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(330%); }
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .results-header h2 {
    font-size: 16px;
    margin: 0;
    font-weight: 650;
  }
  .results-actions { display: flex; gap: 8px; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--panel);
  }
  .card.flagged { border-color: var(--warn); }

  .card .thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: #eee;
  }

  .card .meta {
    padding: 10px 12px;
  }
  .card .meta .label {
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .card .meta .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11.5px;
  }
  .score-pill {
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
  }
  .score-pill.good { background: #e6f3ec; color: var(--good); }
  .score-pill.bad { background: #fbe9e1; color: var(--warn); }

  .flag-note {
    font-size: 11px;
    color: var(--warn);
    margin-top: 4px;
  }

  .empty-state {
    color: var(--muted);
    font-size: 13.5px;
    padding: 40px 0;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 10px;
  }

  .master-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .master-strip img {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .master-strip .info {
    font-size: 12.5px;
    color: var(--muted);
  }
  .master-strip .info b { color: var(--ink); }
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <h1>Variant Studio</h1>
    <span class="tag">DINOv2-filtered variant generator</span>
  </header>

  <div class="grid">
    <div>
      <div class="panel">
        <h2>Master image</h2>
        <div class="dropzone" id="dropzone">
          <div id="dropzone-content">Click or drop an image here</div>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none" />

        <label class="field-label">Brand (optional)</label>
        <input type="text" id="brand-input" placeholder="e.g. Acme Corp" style="width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:13px;" />
      </div>

      <div class="panel">
        <h2>Aspect ratios</h2>
        <div class="chip-row" id="ratio-chips"></div>

        <h2 style="margin-top:20px;">Brand palette tint</h2>
        <div class="chip-row" id="palette-chips"></div>

        <label class="field-label">Similarity threshold (filter below this)</label>
        <div class="range-row">
          <input type="range" id="threshold-slider" min="0.5" max="0.99" step="0.01" value="0.90" />
          <span class="range-val" id="threshold-val">0.90</span>
        </div>

        <button class="primary" id="generate-btn" disabled>Generate variants</button>
        <div class="progress-track" id="progress-track"><div class="progress-fill"></div></div>
        <div class="status-line" id="status-line"></div>
      </div>
    </div>

    <div>
      <div class="panel" id="results-panel">
        <div class="results-header">
          <h2>Generated variants</h2>
          <div class="results-actions" id="results-actions" style="display:none;">
            <button class="secondary" id="export-json-btn">Export JSON</button>
            <button class="secondary" id="download-zip-btn">Download ZIP</button>
          </div>
        </div>

        <div id="master-strip" style="display:none;"></div>
        <div id="gallery-container">
          <div class="empty-state">Upload a master image and click "Generate variants" to see results here.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = "";

const ASPECT_RATIOS = ["1:1", "4:3", "16:9", "9:16", "3:4"];
const PALETTE_COLORS = {
  ocean_blue: "#18629c",
  sunset_orange: "#e67e22",
  forest_green: "#27784b",
  royal_purple: "#6c34a1",
  crimson_red: "#c02942",
  slate_gray: "#5a636e",
  golden_yellow: "#d4a017",
};

let masterRecord = null;
let selectedRatios = new Set(["1:1", "4:3", "16:9"]);
let selectedPalettes = new Set();
let currentMasterId = null;

const ratioChipsEl = document.getElementById("ratio-chips");
ASPECT_RATIOS.forEach(r => {
  const chip = document.createElement("div");
  chip.className = "chip" + (selectedRatios.has(r) ? " active" : "");
  chip.textContent = r;
  chip.onclick = () => {
    if (selectedRatios.has(r)) { selectedRatios.delete(r); chip.classList.remove("active"); }
    else { selectedRatios.add(r); chip.classList.add("active"); }
  };
  ratioChipsEl.appendChild(chip);
});

const paletteChipsEl = document.getElementById("palette-chips");
Object.entries(PALETTE_COLORS).forEach(([name, hex]) => {
  const chip = document.createElement("div");
  chip.className = "chip";
  chip.innerHTML = `<span class="palette-dot" style="background:${hex}"></span>${name.replace('_',' ')}`;
  chip.onclick = () => {
    if (selectedPalettes.has(name)) { selectedPalettes.delete(name); chip.classList.remove("active"); }
    else { selectedPalettes.add(name); chip.classList.add("active"); }
  };
  paletteChipsEl.appendChild(chip);
});

const thresholdSlider = document.getElementById("threshold-slider");
const thresholdVal = document.getElementById("threshold-val");
thresholdSlider.oninput = () => { thresholdVal.textContent = parseFloat(thresholdSlider.value).toFixed(2); };

const dropzone = document.getElementById("dropzone");
const dropzoneContent = document.getElementById("dropzone-content");
const fileInput = document.getElementById("file-input");
const generateBtn = document.getElementById("generate-btn");
const statusLine = document.getElementById("status-line");

dropzone.onclick = () => fileInput.click();
dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add("drag"); };
dropzone.ondragleave = () => dropzone.classList.remove("drag");
dropzone.ondrop = (e) => {
  e.preventDefault();
  dropzone.classList.remove("drag");
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
};
fileInput.onchange = () => { if (fileInput.files.length) handleFile(fileInput.files[0]); };

async function handleFile(file) {
  const localUrl = URL.createObjectURL(file);
  dropzoneContent.innerHTML = `<img src="${localUrl}" /><div>${file.name}</div>`;
  statusLine.textContent = "Uploading master image…";

  const brand = document.getElementById("brand-input").value;
  const formData = new FormData();
  formData.append("file", file);
  if (brand) formData.append("brand", brand);

  try {
    const res = await fetch(`${API}/api/masters`, { method: "POST", body: formData });
    if (!res.ok) throw new Error(await res.text());
    masterRecord = await res.json();
    currentMasterId = masterRecord.id;
    statusLine.textContent = "Master uploaded. Ready to generate.";
    generateBtn.disabled = false;
  } catch (err) {
    statusLine.textContent = "Upload failed: " + err.message;
  }
}

generateBtn.onclick = async () => {
  if (!currentMasterId) return;
  generateBtn.disabled = true;
  document.getElementById("progress-track").classList.add("active");
  statusLine.textContent = "Generating variants and scoring against master embedding…";

  const formData = new FormData();
  formData.append("aspect_ratios", Array.from(selectedRatios).join(","));
  formData.append("palettes", Array.from(selectedPalettes).join(","));
  formData.append("similarity_threshold", thresholdSlider.value);

  try {
    const res = await fetch(`${API}/api/masters/${currentMasterId}/generate`, { method: "POST", body: formData });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    renderResults(data);
    statusLine.textContent = `Done — ${data.summary.variants_generated} generated, ${data.summary.variants_filtered_out} flagged below threshold (${data.summary.processing_time_sec.toFixed(2)}s).`;
  } catch (err) {
    statusLine.textContent = "Generation failed: " + err.message;
  } finally {
    generateBtn.disabled = false;
    document.getElementById("progress-track").classList.remove("active");
  }
};

function renderResults(data) {
  const galleryContainer = document.getElementById("gallery-container");
  const masterStrip = document.getElementById("master-strip");
  const resultsActions = document.getElementById("results-actions");

  masterStrip.style.display = "flex";
  masterStrip.className = "master-strip";
  masterStrip.innerHTML = `
    <img src="/api/masters/${currentMasterId}/image" />
    <div class="info">Master image &middot; <b>${data.variants.length}</b> variants generated</div>
  `;

  resultsActions.style.display = "flex";

  if (!data.variants.length) {
    galleryContainer.innerHTML = `<div class="empty-state">No variants were generated for the selected options.</div>`;
    return;
  }

  galleryContainer.innerHTML = "";
  const gallery = document.createElement("div");
  gallery.className = "gallery";

  data.variants.forEach(v => {
    const card = document.createElement("div");
    card.className = "card" + (!v.passed_filter ? " flagged" : "");
    const scoreClass = v.passed_filter ? "good" : "bad";
    card.innerHTML = `
      <img class="thumb" src="${v.url}" />
      <div class="meta">
        <div class="label">${v.aspect_ratio ? v.aspect_ratio + " · " : ""}${v.variant_type}</div>
        <div class="score-row">
          <span>similarity</span>
          <span class="score-pill ${scoreClass}">${v.similarity_score.toFixed(3)}</span>
        </div>
        ${!v.passed_filter ? '<div class="flag-note">⚠ flagged for review — below threshold</div>' : ""}
      </div>
    `;
    gallery.appendChild(card);
  });

  galleryContainer.appendChild(gallery);
}

document.getElementById("export-json-btn").onclick = () => {
  if (!currentMasterId) return;
  window.open(`/api/masters/${currentMasterId}/export`, "_blank");
};
document.getElementById("download-zip-btn").onclick = () => {
  if (!currentMasterId) return;
  window.location.href = `/api/masters/${currentMasterId}/zip`;
};
</script>

</body>
</html>
